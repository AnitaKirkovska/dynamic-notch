name: Release

# Builds, Developer-ID-signs, notarizes and publishes the Dynamic Notch DMG, then
# writes the released artifact's URL + SHA-256 back into package.json's
# `vellum.artifact` block so the Vellum plugin manifest stays in sync with the
# release.
#
# Trigger by pushing a version tag, e.g.:
#   git tag v1.0.0 && git push origin v1.0.0
# (or run manually from the Actions tab with a tag name).
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   MACOS_CERT_P12_BASE64  base64 of the "Developer ID Application" cert + key (.p12)
#   MACOS_CERT_PASSWORD    password protecting that .p12
#   MACOS_SIGN_IDENTITY    full identity name, e.g.
#                          "Developer ID Application: Anita Kirkovska (TEAMID123)"
#   MACOS_NOTARY_APPLE_ID  Apple ID email used for notarization
#   MACOS_NOTARY_TEAM_ID   Apple Developer Team ID (e.g. TEAMID123)
#   MACOS_NOTARY_PASSWORD  app-specific password for that Apple ID
#   (optional) RELEASE_PAT a PAT with `contents:write` if `main` is protected
#                          and the default GITHUB_TOKEN cannot push to it.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and release (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-14
    env:
      TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      APP_NAME: DynamicNotch
      VOLUME_NAME: Dynamic Notch
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Import signing certificate
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          echo "$MACOS_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT_PATH" -k "$KEYCHAIN" -P "$MACOS_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          # Make the temp keychain searchable so codesign can find the identity.
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          rm -f "$CERT_PATH"

      - name: Build app bundle
        run: |
          set -euo pipefail
          APP="build/${APP_NAME}.app"
          rm -rf build && mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp source/Info.plist "$APP/Contents/Info.plist"
          # Optional avatar / bulb-face images ship inside the bundle when present.
          [ -f source/avatar.png ] && cp source/avatar.png "$APP/Contents/Resources/avatar.png" || true
          [ -f source/face.png ] && cp source/face.png "$APP/Contents/Resources/face.png" || true
          swiftc -O -swift-version 5 source/main.swift -o "$APP/Contents/MacOS/${APP_NAME}"

      - name: Codesign app (hardened runtime)
        env:
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: |
          set -euo pipefail
          APP="build/${APP_NAME}.app"
          codesign --force --options runtime --timestamp \
            --entitlements source/${APP_NAME}.entitlements \
            --sign "$MACOS_SIGN_IDENTITY" "$APP"
          codesign --verify --strict --verbose=2 "$APP"

      - name: Build DMG
        run: |
          set -euo pipefail
          APP="build/${APP_NAME}.app"
          STAGE="build/dmg"
          rm -rf "$STAGE" && mkdir -p "$STAGE"
          cp -R "$APP" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "$VOLUME_NAME" -srcfolder "$STAGE" \
            -ov -format UDZO "${APP_NAME}.dmg"

      - name: Codesign DMG
        env:
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: |
          set -euo pipefail
          codesign --force --timestamp --sign "$MACOS_SIGN_IDENTITY" "${APP_NAME}.dmg"

      - name: Notarize and staple
        env:
          MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
          MACOS_NOTARY_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
        run: |
          set -euo pipefail
          xcrun notarytool submit "${APP_NAME}.dmg" \
            --apple-id "$MACOS_NOTARY_APPLE_ID" \
            --team-id "$MACOS_NOTARY_TEAM_ID" \
            --password "$MACOS_NOTARY_PASSWORD" \
            --wait
          xcrun stapler staple "${APP_NAME}.dmg"
          xcrun stapler validate "${APP_NAME}.dmg"

      - name: Compute SHA-256
        id: hash
        run: |
          set -euo pipefail
          SHA="$(shasum -a 256 "${APP_NAME}.dmg" | awk '{print $1}')"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "DMG SHA-256: $SHA"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${APP_NAME}.dmg" --clobber
          else
            gh release create "$TAG" "${APP_NAME}.dmg" --title "$TAG" --generate-notes
          fi

      - name: Sync vellum.artifact in package.json
        env:
          SHA256: ${{ steps.hash.outputs.sha256 }}
          GH_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          export URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${APP_NAME}.dmg"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          git fetch origin main
          git checkout main

          node -e '
            const fs = require("fs");
            const p = "package.json";
            const j = JSON.parse(fs.readFileSync(p, "utf8"));
            j.vellum = j.vellum || {};
            const label = (j.vellum.artifact && j.vellum.artifact.label) || "";
            j.vellum.artifact = { label, url: process.env.URL, sha256: process.env.SHA256 };
            fs.writeFileSync(p, JSON.stringify(j, null, 2) + "\n");
          '

          if git diff --quiet -- package.json; then
            echo "package.json already in sync; nothing to commit."
            exit 0
          fi
          git add package.json
          git commit -m "chore(release): sync vellum.artifact for ${TAG} [skip ci]"
          git push origin main
